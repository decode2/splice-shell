name: Bug report
description: Report reproducible incorrect behavior in Splice Shell.
title: "fix: "
labels:
  - "status:needs-review"
  - "type:bug"
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched open and closed issues and found no duplicate.
          required: true
        - label: I understand a maintainer must add `status:approved` before work begins or a pull request is opened.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clearly describe the incorrect behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Splice Shell with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error or visible result.
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - WSL
        - Other
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: Operating system version
      placeholder: Windows 11 24H2, Ubuntu 24.04, WSL2, or equivalent
    validations:
      required: true
  - type: dropdown
    id: ai-cli
    attributes:
      label: AI CLI
      description: Select the client involved, or Not applicable.
      options:
        - Claude Code
        - Codex CLI
        - Gemini CLI
        - OpenCode
        - Other
        - Not applicable
    validations:
      required: true
  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: PowerShell, bash, zsh, fish, or other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Splice Shell version or commit
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove secrets and personal information before submitting.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, frequency, regressions, or known workarounds.
