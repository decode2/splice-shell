name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # A tag used to go straight to build-sign-publish with no checks at all: a
  # broken commit could be signed and shipped to users. The release now gates on
  # the CI workflow itself, so the bar for publishing is the same bar as for
  # merging, and it cannot silently drift out of sync with it.
  verify:
    name: Verify
    uses: ./.github/workflows/ci.yml

  release:
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to the same major the CI workflow and package.json engines
          # require. `lts/*` floats, and a release must not build on a runtime
          # the test suite never ran on.
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Splice Shell v__VERSION__'
          releaseBody: 'See the changelog for details.'
          releaseDraft: true
          prerelease: false
          projectPath: './apps/desktop'
